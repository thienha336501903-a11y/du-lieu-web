<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bếp Bánh Sunny - Khóa Học Siêu Tốc</title>
    <style>
        /* GIAO DIỆN TÔNG HỒNG TRẮNG MOBILE-FIRST */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #FFF0F5; margin: 0; padding: 0; color: #333; }
        header { background: linear-gradient(135deg, #ff6699, #ff99cc); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 24px; }
        
        /* TAB ĐIỀU HƯỚNG */
        .tabs { display: flex; justify-content: center; background: white; padding: 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; color: #888; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #ff6699; border-bottom: 3px solid #ff6699; }
        
        /* DANH SÁCH SẢN PHẨM */
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; }
        .card-title { font-size: 18px; font-weight: bold; color: #ff6699; margin: 0 0 10px 0; }
        .price-box { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .price-sale { font-size: 20px; font-weight: bold; color: #e60000; }
        .price-goc { text-decoration: line-through; color: #999; font-size: 14px; }
        .btn-mua { width: 100%; background: #ff6699; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        /* POPUP THANH TOÁN (MODAL) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #aaa; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { width: 100%; background: #4CAF50; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        
        /* BẪY BOT (HONEYPOT) */
        .honeypot { display: none !important; }
        
        #loading { text-align: center; padding: 50px; color: #ff6699; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>🧁 Bếp Bánh Sunny</h1>
        <p style="margin: 5px 0 0 0; font-size: 14px;">Học làm bánh chuẩn vị kinh doanh</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="chuyenTab('hot')">🔥 Khóa Hot</button>
        <button class="tab-btn" onclick="chuyenTab('all')">🍰 Tất cả</button>
    </div>

    <div class="container" id="product-list">
        <div id="loading">⏳ Đang tải dữ liệu từ kho...</div>
    </div>

    <div class="modal" id="checkoutModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0; color:#ff6699;">Thanh toán khóa học</h3>
                <button class="close-btn" onclick="dongModal()">&times;</button>
            </div>
            
            <div style="text-align: center; margin-bottom: 15px;">
                <p><strong>Khóa:</strong> <span id="tenKhoaHocDisplay"></span></p>
                <p><strong>Số tiền:</strong> <span style="color:red; font-weight:bold;" id="giaTienDisplay"></span></p>
                <img id="qrCodeDisplay" src="" style="width: 200px; border: 1px solid #eee; border-radius: 10px;" alt="Mã QR">
                <p style="font-size: 12px; color: #666;">Ngân hàng: <span id="nganHangDisplay"></span><br>STK: <strong id="stkDisplay"></strong></p>
            </div>

            <form id="paymentForm">
                <input type="text" name="website_url" class="honeypot" id="honeypot">
                
                <input type="hidden" id="tenKhoaHocInput">
                <input type="hidden" id="soTienInput">

                <div class="form-group">
                    <label>Tên / Username Telegram của bạn:</label>
                    <input type="text" id="userTele" placeholder="VD: @sunny123 hoặc Số điện thoại" required>
                </div>
                <div class="form-group">
                    <label>Tải ảnh Bill chuyển khoản:</label>
                    <input type="file" id="anhBill" accept="image/*" required>
                </div>
                <button type="submit" class="btn-submit" id="btnGuiBill">🚀 GỬI BILL CHO ADMIN</button>
            </form>
        </div>
    </div>

    <script>
        // === CẤU HÌNH API ===
        const GITHUB_JSON_URL = "https://api.github.com/repos/thienha336501903-a11y/du-lieu-web/contents/data.json";
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMoBcW-PXxjY3TQ15JLUeTxjugff4y6yY9QfqLV1IVZh8kC3ezkYpBnpqgpaMiDbEv0Q/exec";
        
        let duLieuKhoaHoc = [];

        // === 1. TẢI DỮ LIỆU TỪ GITHUB SIÊU TỐC ===
        async function taiDuLieu() {
            try {
                const response = await fetch(GITHUB_JSON_URL);
                const data = await response.json();
                
                // Giải mã Base64 từ GitHub (hỗ trợ Tiếng Việt)
                const decodedStr = decodeURIComponent(escape(window.atob(data.content)));
                const jsonData = JSON.parse(decodedStr);
                
                duLieuKhoaHoc = jsonData.khoa_hoc || [];
                hienThiSanPham("hot"); // Mặc định hiện khóa Hot
            } catch (error) {
                document.getElementById('product-list').innerHTML = "<p style='color:red; text-align:center;'>❌ Lỗi tải dữ liệu. Vui lòng thử lại sau.</p>";
            }
        }

        // === 2. HIỂN THỊ SẢN PHẨM ===
        function hienThiSanPham(tab) {
            const listContainer = document.getElementById('product-list');
            listContainer.innerHTML = "";
            
            let dataRender = duLieuKhoaHoc;
            if(tab === 'hot') {
                dataRender = duLieuKhoaHoc.filter(k => k["Khóa Hot"] === "TRUE");
            }

            if(dataRender.length === 0) {
                listContainer.innerHTML = "<p style='text-align:center;'>Chưa có khóa học nào.</p>";
                return;
            }

            dataRender.forEach(khoa => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${khoa["Ảnh bìa"]}" alt="Ảnh khóa học" onerror="this.src='https://via.placeholder.com/400x200?text=Bep+Banh+Sunny'">
                    <div class="card-content">
                        <h3 class="card-title">${khoa["Tên khóa"]}</h3>
                        <p style="font-size: 14px; color: #555; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${khoa["NoiDungChiTiet"]}</p>
                        <div class="price-box">
                            <span class="price-sale">${khoa["Giá Sale"]}</span>
                            <span class="price-goc">${khoa["Giá Gốc"]}</span>
                        </div>
                        <button class="btn-mua" onclick="moModal('${khoa["ID"]}')">ĐĂNG KÝ NGAY</button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        // Đổi tab
        function chuyenTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            hienThiSanPham(tab);
        }

        // === 3. XỬ LÝ MODAL THANH TOÁN ===
        function moModal(idKhoa) {
            const khoa = duLieuKhoaHoc.find(k => k["ID"] === idKhoa);
            if(!khoa) return;

            document.getElementById('tenKhoaHocDisplay').innerText = khoa["Tên khóa"];
            document.getElementById('giaTienDisplay').innerText = khoa["Giá Sale"];
            document.getElementById('nganHangDisplay').innerText = khoa["Ngân hàng"];
            document.getElementById('stkDisplay').innerText = khoa["STK"];
            document.getElementById('qrCodeDisplay').src = khoa["QR Ngân hàng"];
            
            // Lưu dữ liệu ẩn để gửi đi
            document.getElementById('tenKhoaHocInput').value = khoa["Tên khóa"];
            document.getElementById('soTienInput').value = khoa["Giá Sale"];

            document.getElementById('checkoutModal').style.display = 'flex';
        }

        function dongModal() {
            document.getElementById('checkoutModal').style.display = 'none';
            document.getElementById('paymentForm').reset();
        }

        // === 4. CHUYỂN ẢNH SANG BASE64 ===
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        // === 5. KIỂM TRA RATE LIMIT (Tần suất) ===
        function kiemTraRateLimit() {
            let history = JSON.parse(localStorage.getItem('submitHistory') || '[]');
            const now = new Date().getTime();
            
            // Xóa lịch sử cũ hơn 5 phút
            history = history.filter(time => now - time < 5 * 60 * 1000);
            
            const req1Min = history.filter(time => now - time < 60 * 1000).length;
            const req5Min = history.length;

            if (req1Min >= 2) {
                alert("⏳ Bạn thao tác quá nhanh. Vui lòng đợi 1 phút rồi thử lại!");
                return false;
            }
            if (req5Min >= 3) {
                alert("🛑 Hệ thống nghi ngờ spam. Vui lòng quay lại sau 5 phút!");
                return false;
            }

            history.push(now);
            localStorage.setItem('submitHistory', JSON.stringify(history));
            return true;
        }

        // === 6. XỬ LÝ GỬI FORM LÊN GOOGLE SCRIPT ===
        document.getElementById('paymentForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Kiểm tra bẫy Bot (Honeypot)
            if(document.getElementById('honeypot').value !== "") {
                alert("Phát hiện truy cập bất thường!"); return;
            }

            if(!kiemTraRateLimit()) return;

            const btnSubmit = document.getElementById('btnGuiBill');
            const fileInput = document.getElementById('anhBill');
            const userTele = document.getElementById('userTele').value;
            const tenKhoa = document.getElementById('tenKhoaHocInput').value;
            const soTien = document.getElementById('soTienInput').value;

            if (fileInput.files.length === 0) { alert("Vui lòng chọn ảnh Bill!"); return; }
            const file = fileInput.files[0];
            
            // Giới hạn ảnh 5MB
            if (file.size > 5 * 1024 * 1024) { alert("Ảnh quá lớn! Vui lòng chọn ảnh dưới 5MB."); return; }

            btnSubmit.disabled = true;
            btnSubmit.innerText = "⏳ Đang gửi dữ liệu...";

            try {
                const base64Data = await getBase64(file);
                const payload = {
                    maDon: "DH" + Math.floor(Math.random() * 100000),
                    thoiGian: new Date().toLocaleString('vi-VN'),
                    userTele: userTele,
                    tenKhoa: tenKhoa,
                    soTien: soTien,
                    anhBase64: base64Data,
                    mimeType: file.type,
                    tenFile: "Bill_" + userTele + ".jpg"
                };

                const response = await fetch(APP_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if(result.status === "success") {
                    alert("🎉 Gửi Bill thành công! Admin sẽ duyệt và gửi link qua Telegram cho bạn sớm nhất.");
                    dongModal();
                } else {
                    alert("❌ Có lỗi xảy ra: " + result.message);
                }
            } catch (error) {
                alert("❌ Lỗi mạng: Không thể gửi dữ liệu.");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "🚀 GỬI BILL CHO ADMIN";
            }
        });

        // Khởi động tải dữ liệu
        taiDuLieu();
    </script>
</body>
</html>
