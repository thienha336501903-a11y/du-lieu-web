<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khoá Học Sunny - Giao Diện Mới Tinh Tế</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #fffafc; }
        .active-tab { border-bottom: 3px solid #ff4d6d; color: #ff4d6d; font-weight: bold; }
        .sale-badge { background-color: #ff4d6d; color: white; font-size: 10px; padding: 2px 7px; border-radius: 999px; position: absolute; top: 12px; left: 12px; font-weight: bold; text-transform: uppercase; }
        .price-sale { color: #ff4d6d; font-weight: bold; font-size: 18px; }
        .price-old { text-decoration: line-through; color: #aaa; font-size: 12px; }
        #modal-overlay { background-color: rgba(0,0,0,0.6); display: none; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ff4d6d; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Tối ưu hiệu ứng hover cho nút */
        button { transition: all 0.2s ease-in-out; }
        button:active { scale: 0.96; }
    </style>
</head>
<body>

    <header class="bg-white shadow-sm sticky top-0 z-50 rounded-b-3xl">
        <div class="p-6 text-center">
            <h1 class="text-3xl font-extrabold text-pink-600 uppercase tracking-wide">Khoá Học Sunny</h1>
            <p class="text-gray-500 text-sm mt-1">Học nấu ăn - Khởi nghiệp cùng đam mê</p>
        </div>
        <div class="flex justify-around border-t overflow-x-auto bg-white px-2 rounded-b-3xl" id="tab-menu">
            <button onclick="changeTab('hot')" id="tab-hot" class="py-4 px-3 active-tab text-gray-700">🔥 Khóa Hot</button>
            <button onclick="changeTab('sale')" id="tab-sale" class="py-4 px-3 text-gray-700">⏳ Giảm Giá</button>
            <button onclick="changeTab('all')" id="tab-all" class="py-4 px-3 text-gray-700">📚 Tất Cả</button>
        </div>
    </header>

    <div id="filter-bar" class="p-5 hidden">
        <div class="relative mb-4 flex items-center bg-white border-2 border-pink-200 rounded-full shadow-inner px-4">
            <span class="text-pink-400">🔍</span>
            <input type="text" id="search-input" oninput="filterSearch()" placeholder="Tìm khóa học..." class="w-full p-3 outline-none bg-transparent placeholder-gray-300 text-sm">
        </div>
        <div class="flex gap-2 overflow-x-auto pb-2">
            <button onclick="setCategory('All')" class="bg-white border px-5 py-2 rounded-full text-sm text-gray-700 whitespace-nowrap active:bg-pink-50">Tất cả</button>
            <button onclick="setCategory('Bánh')" class="bg-white border px-5 py-2 rounded-full text-sm text-gray-700 whitespace-nowrap">🍩 Bánh</button>
            <button onclick="setCategory('Chè')" class="bg-white border px-5 py-2 rounded-full text-sm text-gray-700 whitespace-nowrap">🍧 Chè</button>
            <button onclick="setCategory('Đồ mặn')" class="bg-white border px-5 py-2 rounded-full text-sm text-gray-700 whitespace-nowrap">🍗 Đồ mặn</button>
        </div>
    </div>

    <main id="content-grid" class="grid grid-cols-2 md:grid-cols-3 gap-8 px-6 py-8 mb-24"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-pink-100 flex justify-around p-4 z-50 rounded-t-3xl shadow-lg">
        <button onclick="location.reload()" class="text-pink-500 flex flex-col items-center text-[10px] font-bold">🏠<span class="mt-1">Trang chủ</span></button>
        <button onclick="changeTab('library')" class="text-gray-500 flex flex-col items-center text-[10px] font-bold लाइब्रेरी"><span class="mt-1">Thư viện</span></button>
    </nav>

    <div id="modal-overlay" class="fixed inset-0 z-[60] flex items-center justify-center p-5">
        <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden relative p-6 max-h-[95vh] overflow-y-auto shadow-2xl">
            <h2 class="text-xl font-extrabold mb-5 text-center text-pink-600 uppercase tracking-wider">ĐĂNG KÝ KHÓA HỌC</h2>
            <div id="payment-info" class="text-sm space-y-3 mb-5 p-4 bg-white border border-pink-100 rounded-3xl shadow-inner"></div>
            
            <form id="payment-form" onsubmit="handlePayment(event)" class="space-y-4">
                <input type="hidden" id="form-ten-khoa">
                <input type="hidden" id="form-so-tien">
                
                <div>
                    <label class="block text-xs font-semibold mb-1 text-gray-700">Username Telegram của bạn:</label>
                    <input type="text" id="user-tele" required placeholder="@username" class="w-full border-2 border-gray-100 p-3 rounded-full outline-none focus:border-pink-300">
                </div>
                
                <div>
                    <label class="block text-xs font-semibold mb-1 text-red-500">Tải ảnh Bill chuyển khoản:</label>
                    <input type="file" id="bill-img" accept="image/*" required class="w-full text-xs text-gray-500 file:bg-pink-50 file:border file:border-pink-100 file:rounded-full file:px-4 file:py-2 file:text-pink-500 file:text-xs">
                </div>

                <input type="text" name="hp_field" style="display:none !important" tabindex="-1">

                <button type="submit" id="submit-btn" class="w-full bg-pink-500 text-white py-4 rounded-full font-bold shadow-lg shadow-pink-200 uppercase tracking-wider text-sm active:scale-95 transition-all">Gửi yêu cầu duyệt ngay</button>
                <button type="button" onclick="closeModal()" class="w-full text-gray-400 text-sm mt-2 text-center underline font-semibold">Để sau</button>
            </form>
        </div>
    </div>

    <script>
        const DATA_URL = "https://raw.githubusercontent.com/thienha336501903-a11y/du-lieu-web/refs/heads/main/data.json";
        const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxMoBcW-PXxjY3TQ15JLUeTxjugff4y6yY9QfqLV1IVZh8kC3ezkYpBnpqgpaMiDbEv0Q/exec";

        let db = { khoa_hoc: [], thu_vien: [] };
        let currentTab = 'hot';
        let currentCategory = 'All';
        let searchQuery = '';

        function formatDriveUrl(url) {
            if (!url || !url.includes("drive.google.com")) return url;
            const idMatch = url.match(/[-\w]{25,}/);
            if (idMatch) {
                return `https://lh3.googleusercontent.com/d/${idMatch[0]}=w600`;
            }
            return url;
        }

        async function loadData() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '<div class="col-span-2 md:col-span-3 text-center py-10"><span class="loader"></span> Đang tải khóa học...</div>';
            try {
                const res = await fetch(DATA_URL + "?v=" + new Date().getTime());
                db = await res.json();
                render();
            } catch (e) { 
                grid.innerHTML = '<div class="col-span-2 md:col-span-3 text-center text-red-500 font-bold">Lỗi kết nối dữ liệu! Thử tải lại trang.</div>';
            }
        }

        function render() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            let list = [];

            if (currentTab === 'hot') {
                list = db.khoa_hoc.filter(i => String(i["Khóa Hot"]).toUpperCase() === "TRUE" || i["Khóa Hot"] === "Có" || i["Khóa Hot"] === true);
            } else if (currentTab === 'sale') {
                list = db.khoa_hoc.filter(i => i["Giá Sale"] && i["Giá Sale"] !== i["Giá Gốc"]);
            } else if (currentTab === 'library') {
                list = db.thu_vien;
            } else {
                list = db.khoa_hoc;
            }

            if (currentCategory !== 'All') {
                list = list.filter(i => i["Phân loại"] === currentCategory);
            }
            if (searchQuery) {
                list = list.filter(i => (i["Tên khóa"] || i["Tên món"]).toLowerCase().includes(searchQuery.toLowerCase()));
            }

            if (list.length === 0) {
                grid.innerHTML = '<div class="col-span-2 md:col-span-3 text-center py-10 text-gray-400">Chưa có món nào mục này bạn ơi!</div>';
                return;
            }

            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-3xl shadow-lg overflow-hidden relative flex flex-col border border-pink-50 hover:shadow-xl transition-all";
                
                const imgLink = formatDriveUrl(item["Ảnh bìa"] || item["Ảnh"]);
                const isSale = item["Giá Sale"] && item["Giá Sale"] !== item["Giá Gốc"];
                
                card.innerHTML = `
                    <div class="relative h-40 bg-gray-50 rounded-t-3xl">
                        <img src="${imgLink}" class="w-full h-full object-cover rounded-t-3xl" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300?text=SUNNY'">
                        ${isSale ? `<div class="sale-badge">GIẢM GIÁ</div>` : ''}
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="font-bold text-base h-9 line-clamp-2 text-gray-900 leading-tight">${item["Tên khóa"] || item["Tên món"]}</h3>
                        <div class="mt-auto pt-3">
                            ${item["Giá Sale"] ? `
                                <div class="mb-2">
                                    <p class="price-sale">${item["Giá Sale"]}</p>
                                    <p class="price-old leading-none mt-1">${item["Giá Gốc"]}</p>
                                </div>
                            ` : `<p class="text-[12px] text-pink-400 font-bold mb-2">${item["Phân loại"] || "Học Online"}</p>`}
                            <button onclick='showDetail(${JSON.stringify(item)})' class="w-full py-3 bg-pink-500 text-white rounded-full text-[11px] font-bold shadow-md uppercase active:scale-95 transition-all">Xem chi tiết</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function changeTab(tab) {
            currentTab = tab;
            document.querySelectorAll('#tab-menu button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('tab-' + tab)?.classList.add('active-tab');
            document.getElementById('filter-bar').classList.toggle('hidden', !(tab === 'all' || tab === 'library'));
            render();
        }

        function filterSearch() {
            searchQuery = document.getElementById('search-input').value;
            render();
        }

        function setCategory(cat) { currentCategory = cat; render(); }

        function showDetail(item) {
            const modal = document.getElementById('modal-overlay');
            const info = document.getElementById('payment-info');
            
            document.getElementById('form-ten-khoa').value = item["Tên khóa"] || item["Tên món"];
            document.getElementById('form-so-tien').value = item["Giá Sale"] || item["Giá Gốc"] || "0";

            const qrLink = formatDriveUrl(item["QR Ngân hàng"]);

            info.innerHTML = `
                <div class="text-center mb-5">
                    <p class="text-pink-600 font-extrabold text-xl leading-tight uppercase mb-3">${item["Tên khóa"] || item["Tên món"]}</p>
                    ${qrLink ? `<img src="${qrLink}" class="w-56 h-56 mx-auto border-4 border-pink-100 rounded-3xl shadow-md" onerror="this.style.display='none'">` : ''}
                </div>
                <div class="space-y-1.5 text-[13px] bg-gray-50 border border-gray-100 p-4 rounded-2xl">
                    <p><b>Giá bán:</b> <span class="text-red-500 font-bold">${item["Giá Sale"] || item["Giá Gốc"] || "Miễn phí"}</span></p>
                    <p><b>Ngân hàng:</b> ${item["Ngân hàng"] || "Chưa cập nhật"}</p>
                    <p><b>Số tài khoản:</b> <span class="text-blue-600 font-bold select-all">${item["STK"] || ""}</span></p>
                    <p><b>Chủ tài khoản:</b> ${item["Chủ TK"] || ""}</p>
                </div>
                <p class="mt-4 text-[11px] text-gray-500 italic text-center">Nội dung chuyển khoản: ${item["ID"] || "Chuyển khoản học bánh"}</p>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        async function handlePayment(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            
            const lastSent = localStorage.getItem('lastSent');
            if (lastSent && Date.now() - lastSent < 30000) {
                alert("Vui lòng đợi 30 giây để gửi tiếp bạn nhé!"); return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Đang gửi yêu cầu...';

            const fileInput = document.getElementById('bill-img');
            if (!fileInput.files[0]) {
                alert("Bạn chưa chọn ảnh Bill thanh toán!");
                btn.disabled = false; btn.innerText = 'Gửi đơn duyệt ngay';
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const payload = {
                    userTele: document.getElementById('user-tele').value,
                    tenKhoa: document.getElementById('form-ten-khoa').value,
                    soTien: document.getElementById('form-so-tien').value,
                    anhBase64: reader.result,
                    mimeType: file.type,
                    tenFile: file.name
                };

                try {
                    const res = await fetch(WEBHOOK_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();
                    if (result.status === 'success') {
                        alert("✅ GỬI THÀNH CÔNG!\nBạn chờ Sunny kiểm tra và duyệt đơn nhé.");
                        localStorage.setItem('lastSent', Date.now());
                        closeModal();
                    } else { throw new Error(); }
                } catch (err) { alert("Lỗi kết nối! Vui lòng chụp màn hình gửi trực tiếp cho Admin."); }
                btn.disabled = false;
                btn.innerText = 'Gửi đơn duyệt ngay';
            };
        }

        loadData();
    </script>
</body>
</html>
