<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bếp Bánh Sunny - Khoá Học Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #fff5f7; }
        .active-tab { border-bottom: 3px solid #ff4d6d; color: #ff4d6d; font-weight: bold; }
        .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .sale-badge { background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; position: absolute; top: 8px; left: 8px; }
        .price-sale { color: #ff4d6d; font-weight: bold; font-size: 16px; }
        .price-old { text-decoration: line-through; color: #999; font-size: 12px; }
        #modal-overlay { background: rgba(0,0,0,0.6); display: none; }
        /* Hiệu ứng loading */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ff4d6d; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="p-4 text-center">
            <h1 class="text-2xl font-bold text-pink-500">Bếp Bánh Sunny</h1>
            <p class="text-gray-500 text-sm">Học nấu ăn - Khởi nghiệp cùng đam mê</p>
        </div>
        <div class="flex justify-around border-t overflow-x-auto bg-white" id="tab-menu">
            <button onclick="changeTab('hot')" id="tab-hot" class="py-3 px-2 active-tab">🔥 Khóa Hot</button>
            <button onclick="changeTab('sale')" id="tab-sale" class="py-3 px-2">⏳ Giảm Giá</button>
            <button onclick="changeTab('all')" id="tab-all" class="py-3 px-2">📚 Tất Cả</button>
        </div>
    </header>

    <div id="filter-bar" class="p-3 hidden">
        <input type="text" id="search-input" oninput="filterData()" placeholder="Tìm món ăn..." class="w-full p-2 border rounded-full mb-2 outline-none border-pink-200">
        <div class="flex gap-2 overflow-x-auto pb-2">
            <button onclick="setCategory('All')" class="bg-white border px-4 py-1 rounded-full text-sm">Tất cả</button>
            <button onclick="setCategory('Bánh')" class="bg-white border px-4 py-1 rounded-full text-sm">🍩 Bánh</button>
            <button onclick="setCategory('Chè')" class="bg-white border px-4 py-1 rounded-full text-sm">🍧 Chè</button>
            <button onclick="setCategory('Đồ mặn')" class="bg-white border px-4 py-1 rounded-full text-sm">🍗 Đồ mặn</button>
        </div>
    </div>

    <main id="content-grid" class="card-grid mb-20"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50">
        <button onclick="location.reload()" class="text-pink-500 flex flex-col items-center text-xs">🏠<span>Trang chủ</span></button>
        <button onclick="changeTab('library')" class="text-gray-500 flex flex-col items-center text-xs">📖<span>Thư viện</span></button>
    </nav>

    <div id="modal-overlay" class="fixed inset-0 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden relative p-5">
            <h2 class="text-lg font-bold mb-4 text-center">ĐĂNG KÝ KHÓA HỌC</h2>
            <div id="payment-info" class="text-sm space-y-2 mb-4 bg-gray-50 p-3 rounded-lg"></div>
            
            <form id="payment-form" onsubmit="handlePayment(event)" class="space-y-3">
                <input type="hidden" id="form-ten-khoa">
                <input type="hidden" id="form-so-tien">
                
                <div>
                    <label class="block text-xs font-semibold mb-1">Username Telegram của bạn:</label>
                    <input type="text" id="user-tele" required placeholder="@username" class="w-full border p-2 rounded-lg outline-none focus:border-pink-400">
                </div>
                
                <div>
                    <label class="block text-xs font-semibold mb-1">Tải ảnh Bill chuyển khoản:</label>
                    <input type="file" id="bill-img" accept="image/*" required class="w-full text-sm">
                </div>

                <input type="text" name="hp_field" style="display:none !important" tabindex="-1" autocomplete="off">

                <button type="submit" id="submit-btn" class="w-full bg-pink-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-pink-200">GỬI YÊU CẦU DUYỆT</button>
                <button type="button" onclick="closeModal()" class="w-full text-gray-400 text-sm mt-2 text-center">Để sau</button>
            </form>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH ---
        const DATA_URL = "https://raw.githubusercontent.com/thienha336501903-a11y/du-lieu-web/refs/heads/main/data.json";
        const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxMoBcW-PXxjY3TQ15JLUeTxjugff4y6yY9QfqLV1IVZh8kC3ezkYpBnpqgpaMiDbEv0Q/exec;

        let db = { khoa_hoc: [], thu_vien: [] };
        let currentTab = 'hot';
        let currentCategory = 'All';

        async function loadData() {
            try {
                const res = await fetch(DATA_URL + "?v=" + new Date().getTime());
                db = await res.json();
                render();
            } catch (e) { alert("Lỗi tải dữ liệu!"); }
        }

        function render() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            let list = [];

            if (currentTab === 'hot') list = db.khoa_hoc.filter(i => i["Khóa Hot"] === "TRUE" || i["Khóa Hot"] === "Có");
            else if (currentTab === 'sale') list = db.khoa_hoc.filter(i => i["Giá Sale"] && i["Giá Sale"] !== i["Giá Gốc"]);
            else if (currentTab === 'library') list = db.thu_vien;
            else list = db.khoa_hoc;

            // Lọc theo Category nếu ở Tab All hoặc Library
            if (currentCategory !== 'All') {
                list = list.filter(i => i["Phân loại"] === currentCategory);
            }

            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm overflow-hidden relative";
                const isSale = item["Giá Sale"] && item["Giá Sale"] !== item["Giá Gốc"];
                
                card.innerHTML = `
                    <img src="${item["Ảnh bìa"] || item["Ảnh"]}" class="w-full h-32 object-cover">
                    ${isSale ? `<div class="sale-badge">GIẢM GIÁ</div>` : ''}
                    <div class="p-2">
                        <h3 class="font-bold text-xs h-8 line-clamp-2">${item["Tên khóa"] || item["Tên món"]}</h3>
                        ${item["Giá Sale"] ? `
                            <div class="mt-1">
                                <span class="price-sale">${item["Giá Sale"]}đ</span>
                                <span class="price-old">${item["Giá Gốc"]}đ</span>
                            </div>
                        ` : '<div class="text-xs text-blue-500 font-semibold mt-2">Xem chi tiết</div>'}
                        <button onclick='showDetail(${JSON.stringify(item)})' class="w-full mt-2 py-1.5 bg-pink-50 text-pink-500 rounded-lg text-xs font-bold border border-pink-100">XEM NGAY</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function changeTab(tab) {
            currentTab = tab;
            document.querySelectorAll('#tab-menu button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('tab-' + tab)?.classList.add('active-tab');
            document.getElementById('filter-bar').style.display = (tab === 'all' || tab === 'library') ? 'block' : 'none';
            render();
        }

        function setCategory(cat) { currentCategory = cat; render(); }

        function showDetail(item) {
            const modal = document.getElementById('modal-overlay');
            const info = document.getElementById('payment-info');
            
            document.getElementById('form-ten-khoa').value = item["Tên khóa"];
            document.getElementById('form-so-tien').value = item["Giá Sale"] || item["Giá Gốc"];

            info.innerHTML = `
                <p><b>Khoá học:</b> ${item["Tên khóa"]}</p>
                <p><b>Giá ưu đãi:</b> <span class="text-pink-600 font-bold">${item["Giá Sale"] || item["Giá Gốc"]}đ</span></p>
                <div class="border-t pt-2 mt-2">
                    <p class="font-bold">🏦 THÔNG TIN CHUYỂN KHOẢN:</p>
                    <p>Ngân hàng: ${item["Ngân hàng"]}</p>
                    <p>STK: ${item["STK"]}</p>
                    <p>Chủ TK: ${item["Chủ TK"]}</p>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        async function handlePayment(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            
            // Rate Limit 2 phút 1 lần
            const lastSent = localStorage.getItem('lastSent');
            if (lastSent && Date.now() - lastSent < 60000) {
                alert("Bạn gửi quá nhanh, vui lòng đợi 1 phút!"); return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Đang gửi...';

            const file = document.getElementById('bill-img').files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const payload = {
                    userTele: document.getElementById('user-tele').value,
                    tenKhoa: document.getElementById('form-ten-khoa').value,
                    soTien: document.getElementById('form-so-tien').value,
                    anhBase64: reader.result,
                    mimeType: file.type,
                    tenFile: file.name
                };

                try {
                    const res = await fetch(WEBHOOK_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();
                    if (result.status === 'success') {
                        alert("✅ Gửi đơn thành công! Vui lòng đợi Admin duyệt.");
                        localStorage.setItem('lastSent', Date.now());
                        closeModal();
                    }
                } catch (err) { alert("Lỗi gửi đơn!"); }
                btn.disabled = false;
                btn.innerText = 'GỬI YÊU CẦU DUYỆT';
            };
        }

        loadData();
    </script>
</body>
</html>
