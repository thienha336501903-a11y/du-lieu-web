<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khoá Học Sunny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f3f4f6; }
        .active-tab { border-bottom: 3px solid #ff4d6d; color: #ff4d6d; font-weight: 800; }
        .sale-badge { background-color: #ff4d6d; color: white; font-size: 10px; padding: 3px 8px; border-radius: 999px; position: absolute; top: 10px; left: 10px; font-weight: bold; text-transform: uppercase; z-index: 10; }
        .timer-badge { background: linear-gradient(90deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); color: #d81159; font-size: 10px; padding: 4px 8px; border-bottom-left-radius: 16px; border-top-right-radius: 24px; position: absolute; top: 0; right: 0; font-weight: 800; z-index: 10; display: none; }
        .price-sale { color: #ff4d6d; font-weight: 800; font-size: 18px; }
        .price-old { text-decoration: line-through; color: #a1a1aa; font-size: 13px; margin-left: 6px; font-weight: 600; }
        .overlay { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(2px); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ff4d6d; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button:active { transform: scale(0.96); }
    </style>
</head>
<body class="pb-20">

    <header class="bg-white shadow-sm sticky top-0 z-40 rounded-b-3xl">
        <div class="p-5 text-center">
            <h1 class="text-2xl font-extrabold text-pink-500 uppercase">Khoá Học Sunny</h1>
        </div>
        <div class="flex justify-around border-t bg-white px-2 rounded-b-3xl" id="tab-menu">
            <button onclick="changeTab('hot')" id="tab-hot" class="py-3 px-3 active-tab text-gray-600 font-semibold text-sm">🔥 Khóa Hot</button>
            <button onclick="changeTab('sale')" id="tab-sale" class="py-3 px-3 text-gray-600 font-semibold text-sm">⏳ Giảm Giá</button>
            <button onclick="changeTab('all')" id="tab-all" class="py-3 px-3 text-gray-600 font-semibold text-sm">📚 Tất Cả</button>
        </div>
    </header>

    <main id="content-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 px-4 py-6"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-40 rounded-t-3xl shadow-lg">
        <button onclick="location.reload()" class="text-pink-500 flex flex-col items-center text-[10px] font-extrabold">🏠<span class="mt-1">Trang chủ</span></button>
        <button onclick="changeTab('library')" class="text-gray-400 flex flex-col items-center text-[10px] font-extrabold">📖<span class="mt-1">Thư viện</span></button>
    </nav>

    <div id="detail-modal" class="overlay fixed inset-0 z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-[24px] w-full max-w-sm overflow-hidden relative shadow-2xl flex flex-col max-h-[90vh]">
            <button onclick="closeDetailModal()" class="absolute top-3 right-3 bg-black/40 text-white w-8 h-8 rounded-full flex items-center justify-center z-10 hover:bg-black/60">✕</button>
            <div class="relative h-48 w-full bg-gray-100 shrink-0">
                <img id="detail-img" src="" class="w-full h-full object-cover">
            </div>
            <div class="p-5 flex flex-col flex-grow overflow-hidden">
                <h2 id="detail-title" class="text-xl font-extrabold text-center text-gray-800 leading-tight"></h2>
                <div class="text-center mt-3 mb-3">
                    <span id="detail-price-sale" class="price-sale text-2xl"></span>
                    <span id="detail-price-old" class="price-old"></span>
                </div>
                <div id="sale-countdown-banner" class="bg-yellow-50 border border-yellow-200 text-yellow-700 text-center py-1.5 rounded-lg text-[11px] font-bold mb-4 hidden">
                    🔥 Sale kết thúc sau: <span id="countdown-timer" class="text-red-500"></span>
                </div>
                <div class="flex-grow overflow-y-auto pr-1 mb-4">
                    <p class="font-bold text-xs text-gray-800 mb-2">Nội dung chương trình:</p>
                    <div id="detail-content" class="text-[12px] text-gray-600 space-y-1.5 leading-relaxed"></div>
                </div>
                <button onclick="openPaymentModal()" class="w-full bg-[#ff4d6d] text-white py-3.5 rounded-xl font-extrabold text-sm uppercase">Đăng ký ngay</button>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="overlay fixed inset-0 z-[60] hidden items-center justify-center p-4">
        <div class="bg-white rounded-[24px] w-full max-w-sm relative p-6 max-h-[95vh] overflow-y-auto shadow-2xl">
            <button onclick="closePaymentModal()" class="absolute top-3 right-3 text-gray-400 text-xl font-bold p-2">✕</button>
            <h2 class="text-lg font-extrabold mb-4 text-center text-pink-600 uppercase">Hoàn Tất Đăng Ký</h2>
            <div id="payment-info" class="text-center mb-5"></div>
            <form id="payment-form" onsubmit="handlePayment(event)" class="space-y-4">
                <input type="text" id="user-tele" required placeholder="Username Telegram..." class="w-full border-2 p-3 rounded-xl outline-none font-semibold text-sm">
                <input type="file" id="bill-img" accept="image/*" required class="w-full text-xs file:bg-pink-50 file:rounded-lg file:px-4 file:py-2 file:text-pink-600 font-bold">
                <button type="submit" id="submit-btn" class="w-full bg-pink-500 text-white py-3.5 rounded-xl font-extrabold uppercase text-sm mt-2">Gửi cho Sunny duyệt</button>
            </form>
        </div>
    </div>

    <script>
        const DATA_URL = "https://raw.githubusercontent.com/thienha336501903-a11y/du-lieu-web/refs/heads/main/data.json";
        const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxMoBcW-PXxjY3TQ15JLUeTxjugff4y6yY9QfqLV1IVZh8kC3ezkYpBnpqgpaMiDbEv0Q/exec";

        let db = { khoa_hoc: [], thu_vien: [] };
        let currentTab = 'hot';
        let currentSelectedItem = null;
        let detailCountdownInterval, globalTimerInterval;

        // ĐÃ SỬA LỖI TẠI ĐÂY (Thêm dấu $ và đổi sang server lh3 siêu mượt)
        function formatDriveUrl(url) {
            if (!url || !url.includes("drive.google.com")) return url;
            let id = url.match(/[-\w]{25,}/);
            return id ? `https://lh3.googleusercontent.com/d/${id[0]}=w800` : url;
        }

        // Hàm chuyển đổi chuỗi ngày sang Date
        function parseDateString(dateStr) {
            if(!dateStr) return null;
            try {
                const p = dateStr.trim().split(" ");
                const t = p[0].split(":"), d = p[1].split("/");
                return new Date(d[2], d[1] - 1, d[0], t[0], t[1]);
            } catch(e) { return null; }
        }

        function isSaleValid(item) {
            if (!item["Giá Sale"] || item["Giá Sale"] === item["Giá Gốc"]) return false;
            const endTime = parseDateString(item["Kết thúc Sale"]);
            if (!endTime) return true; 
            return endTime > new Date(); 
        }

        async function loadData() {
            try {
                const res = await fetch(DATA_URL + "?v=" + new Date().getTime());
                db = await res.json();
                render();
                
                const urlId = new URLSearchParams(window.location.search).get('id');
                if (urlId) {
                    const foundCourse = db.khoa_hoc.find(i => i["ID"] === urlId);
                    if (foundCourse) openDetailModal(foundCourse);
                }
            } catch (e) { document.getElementById('content-grid').innerHTML = 'Lỗi kết nối!'; }
        }

        function render() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            let list = [];

            if (currentTab === 'hot') list = db.khoa_hoc.filter(i => String(i["Khóa Hot"]).toUpperCase() === "TRUE" || i["Khóa Hot"] === "Có" || i["Khóa Hot"] === true);
            else if (currentTab === 'sale') list = db.khoa_hoc.filter(i => isSaleValid(i));
            else if (currentTab === 'library') list = db.thu_vien;
            else list = db.khoa_hoc;

            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm overflow-hidden flex flex-col border border-gray-100";
                
                const activeSale = isSaleValid(item);
                const imgLink = formatDriveUrl(item["Ảnh bìa"] || item["Ảnh"]);
                
                card.innerHTML = `
                    <div class="relative h-32 bg-gray-50">
                        <img src="${imgLink}" class="w-full h-full object-cover">
                        ${activeSale ? `<div class="sale-badge">SALE</div><div class="timer-badge global-timer" data-endtime="${item["Kết thúc Sale"] || ''}">⏳ ...</div>` : ''}
                    </div>
                    <div class="p-3 flex flex-col flex-grow">
                        <h3 class="font-extrabold text-[12px] h-8 line-clamp-2">${item["Tên khóa"] || item["Tên món"]}</h3>
                        <div class="mt-auto pt-2">
                            ${activeSale ? `
                                <div class="mb-2 flex items-baseline"><span class="price-sale text-[15px]">${item["Giá Sale"]}</span><span class="price-old text-[10px]">${item["Giá Gốc"]}</span></div>
                            ` : `<div class="mb-2"><span class="price-sale text-[15px]">${item["Giá Gốc"] || "Đang cập nhật"}</span></div>`}
                            <button onclick='openDetailModal(${JSON.stringify(item)})' class="w-full py-2 bg-pink-50 text-pink-600 rounded-lg text-[10px] font-extrabold uppercase">Xem chi tiết</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            startGlobalTimers();
        }

        function startGlobalTimers() {
            clearInterval(globalTimerInterval);
            globalTimerInterval = setInterval(() => {
                document.querySelectorAll('.global-timer').forEach(el => {
                    const endTime = parseDateString(el.getAttribute('data-endtime'));
                    if (endTime && endTime > new Date()) {
                        const diff = endTime - new Date();
                        const d = Math.floor(diff / 86400000), h = Math.floor((diff / 3600000) % 24), m = Math.floor((diff / 60000) % 60), s = Math.floor((diff / 1000) % 60);
                        el.innerText = d > 0 ? `⏳ ${d} ngày nữa` : `⏳ ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                        el.style.display = 'block';
                    } else el.style.display = 'none';
                });
            }, 1000);
        }

        function openDetailModal(item) {
            currentSelectedItem = item;
            const modal = document.getElementById('detail-modal');
            const activeSale = isSaleValid(item);
            
            document.getElementById('detail-img').src = formatDriveUrl(item["Ảnh bìa"] || item["Ảnh"]);
            document.getElementById('detail-title').innerText = item["Tên khóa"] || item["Tên món"];
            
            document.getElementById('detail-price-sale').innerText = activeSale ? item["Giá Sale"] : (item["Giá Gốc"] || "Miễn phí");
            document.getElementById('detail-price-old').innerText = activeSale ? item["Giá Gốc"] : "";

            clearInterval(detailCountdownInterval);
            const bannerEl = document.getElementById('sale-countdown-banner');
            const timerEl = document.getElementById('countdown-timer');
            const endSaleTime = parseDateString(item["Kết thúc Sale"]);

            if (activeSale && endSaleTime) {
                bannerEl.classList.remove('hidden');
                detailCountdownInterval = setInterval(() => {
                    const diff = endSaleTime - new Date();
                    if (diff <= 0) { bannerEl.classList.add('hidden'); clearInterval(detailCountdownInterval); } 
                    else {
                        const d = Math.floor(diff / 86400000), h = Math.floor((diff / 3600000) % 24), m = Math.floor((diff / 60000) % 60), s = Math.floor((diff / 1000) % 60);
                        timerEl.innerText = `${d > 0 ? d+' ngày ' : ''}${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    }
                }, 1000);
            } else bannerEl.classList.add('hidden');

            let rawContent = item["NoiDungChiTiet"];
            if (rawContent && rawContent !== "Không tìm thấy nội dung file mô tả.") {
                document.getElementById('detail-content').innerHTML = rawContent.split('\n').filter(l => l.trim() !== '').map(l => `<div class="flex items-start mb-1.5"><span class="text-blue-600 mr-2">✔️</span> <span>${l.replace(/^[-+*]\s*/, '')}</span></div>`).join('');
            } else document.getElementById('detail-content').innerHTML = "Đang cập nhật...";

            modal.classList.remove('hidden'); modal.classList.add('flex');
        }

        function closeDetailModal() { document.getElementById('detail-modal').classList.add('hidden'); document.getElementById('detail-modal').classList.remove('flex'); clearInterval(detailCountdownInterval); }

        function openPaymentModal() {
            closeDetailModal(); 
            const item = currentSelectedItem;
            const activeSale = isSaleValid(item);
            const price = activeSale ? item["Giá Sale"] : (item["Giá Gốc"] || "0đ");

            document.getElementById('payment-info').innerHTML = `
                <p class="font-bold text-sm mb-3">Khóa: <span class="text-pink-500">${item["Tên khóa"]}</span></p>
                <div class="text-xs bg-gray-50 p-3 rounded-xl text-left border">
                    <p><b>Thanh toán:</b> <span class="text-red-500 font-bold">${price}</span></p>
                    <p><b>Ngân hàng:</b> ${item["Ngân hàng"]}</p>
                    <p><b>Số TK:</b> <span class="text-blue-600 font-bold">${item["STK"]}</span></p>
                    <p><b>Chủ TK:</b> ${item["Chủ TK"]}</p>
                    <p class="mt-2 border-t pt-2 text-gray-500">Nội dung CK: Tên Tele + ${item["ID"]}</p>
                </div>
            `;
            document.getElementById('payment-modal').classList.remove('hidden');
            document.getElementById('payment-modal').classList.add('flex');
        }

        function closePaymentModal() { document.getElementById('payment-modal').classList.add('hidden'); document.getElementById('payment-modal').classList.remove('flex'); }
        function changeTab(t) { currentTab = t; document.querySelectorAll('#tab-menu button').forEach(b => b.classList.remove('active-tab')); document.getElementById('tab-'+t).classList.add('active-tab'); render(); }
        
        async function handlePayment(e) {
            e.preventDefault();
            document.getElementById('submit-btn').innerHTML = 'Đang gửi...';
            const item = currentSelectedItem;
            const f = document.getElementById('bill-img').files[0];
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = async () => {
                await fetch(WEBHOOK_URL, { method: 'POST', body: JSON.stringify({ userTele: document.getElementById('user-tele').value, tenKhoa: item["Tên khóa"], soTien: isSaleValid(item) ? item["Giá Sale"] : item["Giá Gốc"], anhBase64: r.result, mimeType: f.type, tenFile: f.name }) });
                alert("🎉 Đã gửi đơn thành công!"); closePaymentModal(); document.getElementById('submit-btn').innerHTML = 'Gửi cho Sunny duyệt';
            };
        }
        loadData();
    </script>
</body>
</html>
